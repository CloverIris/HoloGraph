<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64b5f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e88e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="#0a0a0f"/>
  
  <!-- Stars background -->
  <circle cx="40" cy="50" r="2" fill="#64b5f6" opacity="0.6"/>
  <circle cx="200" cy="40" r="1.5" fill="#90caf9" opacity="0.4"/>
  <circle cx="220" cy="180" r="2" fill="#64b5f6" opacity="0.5"/>
  <circle cx="30" cy="200" r="1.5" fill="#bbdefb" opacity="0.4"/>
  <circle cx="180" cy="220" r="1" fill="#e3f2fd" opacity="0.3"/>
  
  <!-- Central constellation -->
  <g filter="url(#glow)">
    <!-- Connection lines -->
    <line x1="128" y1="80" x2="80" y2="128" stroke="#64b5f6" stroke-width="2" opacity="0.6"/>
    <line x1="128" y1="80" x2="176" y2="128" stroke="#64b5f6" stroke-width="2" opacity="0.6"/>
    <line x1="80" y1="128" x2="128" y2="176" stroke="#64b5f6" stroke-width="2" opacity="0.6"/>
    <line x1="176" y1="128" x2="128" y2="176" stroke="#64b5f6" stroke-width="2" opacity="0.6"/>
    <line x1="80" y1="128" x2="176" y2="128" stroke="#90caf9" stroke-width="1.5" opacity="0.4"/>
    
    <!-- Nodes -->
    <circle cx="128" cy="80" r="14" fill="url(#grad1)"/>
    <circle cx="128" cy="80" r="6" fill="#fff"/>
    
    <circle cx="80" cy="128" r="10" fill="#1e88e5"/>
    <circle cx="80" cy="128" r="4" fill="#fff"/>
    
    <circle cx="176" cy="128" r="10" fill="#1e88e5"/>
    <circle cx="176" cy="128" r="4" fill="#fff"/>
    
    <circle cx="128" cy="176" r="12" fill="url(#grad1)"/>
    <circle cx="128" cy="176" r="5" fill="#fff"/>
  </g>
  
  <!-- Small orbiting dots -->
  <circle cx="128" cy="60" r="3" fill="#64b5f6" opacity="0.8"/>
  <circle cx="60" cy="128" r="2.5" fill="#90caf9" opacity="0.7"/>
  <circle cx="196" cy="128" r="2.5" fill="#90caf9" opacity="0.7"/>
  <circle cx="128" cy="196" r="3" fill="#64b5f6" opacity="0.8"/>
</svg>
